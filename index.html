<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog da Lala</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            margin: 20px;
            color: #333;
        }

        /* Estilo do cabeçalho (Header) */
        header {
            background-color: #831374; /* Azul escuro */
            color: white;
            text-align: center;
            padding: 20px;
            border: 4px solid #570b2b; /* Borda vermelha */
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
        }

        header p {
            margin-top: 10px;
            font-size: 1.1em;
        }

        /* Estilo do post */
        .post-title {
            font-size: 1.8em;
            font-weight: bold;
            color: #3b0946;
            margin-bottom: 5px;
        }

        .author {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 20px;
        }

        .content {
            font-size: 1.1em;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <header>
        <h1>Blog da Lala</h1>
        <p>Vou compartilhar conhecimentos sobre tecnologia e programação!!!</p>
        <img src=https://nossomeio.com.br/wp-content/themes/2024/690/0/crop/2022/02/TECNOLOGIAS-HUMANOIDES.jpeg" alt="Imagem do blog" width="300">
    </header>
    

    <main>
        <div class="post-title">Meu primeiro post</div>
        <div class="author">Por: Larissa Igrejas</div>
        
        <div class="content">
            Bem-vindos(as) ao meu novo blog! Aqui vou compartilhar dicas de programação e curiosidades da área de tecnologia.
        </div>
    </main>

</body>
</html>
